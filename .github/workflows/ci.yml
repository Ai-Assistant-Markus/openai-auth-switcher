name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile
        run: python3 -m py_compile openai_auth_switcher.py tests/verify_publishable_switcher.py

      - name: Verify isolated flow
        run: python3 tests/verify_publishable_switcher.py
